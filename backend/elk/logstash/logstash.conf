input {
  tcp {
    port => 5044
    codec => json_lines
  }
}

filter {
  if [app_name] {
    mutate {
      add_field => { "service_name" => "%{app_name}" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "smartsure-logs-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}
