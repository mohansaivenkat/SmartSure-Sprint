spring.application.name=api-gateway
server.port=8888
spring.cloud.config.enabled=true
# spring.config.import=optional:configserver:http://localhost:9999,optional:file:../.env[.properties],optional:file:../../.env[.properties]
# spring.config.import=configserver:http://localhost:9999,file:../.env[.properties],file:../../.env[.properties]
spring.config.import=configserver:${CONFIG_SERVER_URL:http://localhost:9999},optional:file:../.env[.properties],optional:file:../../.env[.properties]

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Dynamic Routing via Eureka Discovery (no hardcoded routes)
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

# Add Secret Header to all routed requests
spring.cloud.gateway.default-filters[0]=AddRequestHeader=X-Gateway-Secret, ${GATEWAY_SECRET}

# JWT Secret (same key used across all services)
jwt.secret=${JWT_SECRET}

# Logging
logging.level.root=INFO
logging.level.org.springframework.cloud.gateway=DEBUG

# Swagger Aggregation from all services in Eureka
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/auth-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=Policy Service
springdoc.swagger-ui.urls[1].url=/policy-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=Claims Service
springdoc.swagger-ui.urls[2].url=/claims-service/v3/api-docs
springdoc.swagger-ui.urls[3].name=Admin Service
springdoc.swagger-ui.urls[3].url=/admin-service/v3/api-docs
springdoc.swagger-ui.urls[4].name=Payment Service
springdoc.swagger-ui.urls[4].url=/payment-service/v3/api-docs
