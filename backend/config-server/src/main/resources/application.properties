# ==============================================================
# Config Server - OWN startup configuration
# ==============================================================
spring.application.name=config-server
server.port=9999

# Prevent the Config Server from trying to be its OWN client
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# Use the Git backend to source configs from GitHub
# (Default profile for Config Server is git, but we set it explicitly for clarity)
spring.profiles.active=git
spring.cloud.config.server.git.uri=https://github.com/mohansaivenkat/SmartSure-Config-Server.git
spring.cloud.config.server.git.clone-on-start=true
spring.cloud.config.server.git.default-label=main
spring.cloud.config.server.git.skip-ssl-validation=true

# Eureka registration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Monitoring
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

# Logging
logstash.host=${LOGSTASH_HOST:localhost}
logging.level.root=INFO
logging.file.name=../loggers/config-server.log