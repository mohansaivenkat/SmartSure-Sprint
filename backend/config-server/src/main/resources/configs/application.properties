# ==============================================================
# SHARED CONFIGURATION (served to ALL microservices by Config Server)
# ==============================================================

# --------------------------------------------------------------
# Database (PostgreSQL)
# --------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5433/smart_sure
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD}


# --------------------------------------------------------------
# JPA / Hibernate
# --------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver

# --------------------------------------------------------------
# Eureka registration
# --------------------------------------------------------------
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false

# --------------------------------------------------------------
# JWT secret (shared across all services)
# --------------------------------------------------------------
jwt.secret=${JWT_SECRET}

# --------------------------------------------------------------
# Redis for caching and storage
# --------------------------------------------------------------
spring.data.redis.host=localhost
spring.data.redis.port=6379

# --------------------------------------------------------------
# Logging
# --------------------------------------------------------------
logging.level.root=INFO
# 1. Expose endpoints
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.endpoint.metrics.enabled=true
# 2. Prometheus Export
management.metrics.export.prometheus.enabled=true
# 3. Micrometer Tags (VERY IMPORTANT: Allows Grafana to filter per service)
management.metrics.tags.application=${spring.application.name}
# 4. HTTP Request Metrics
management.metrics.enable.http.server.requests=true
management.observations.key-values.http.server.requests.enabled=true
# 5. Distributed Tracing (Zipkin)
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.tracing.sampling.probability=1.0

# --------------------------------------------------------------
# Forwarded Headers (so Swagger uses Gateway URL, not direct port)
# --------------------------------------------------------------
server.forward-headers-strategy=framework

# --------------------------------------------------------------
# Swagger / OpenAPI
# --------------------------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# --------------------------------------------------------------
# Razorpay Configuration
# --------------------------------------------------------------
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

# --------------------------------------------------------------
# Logstash Configuration
# --------------------------------------------------------------
logstash.host=${LOGSTASH_HOST:localhost}
logstash.port=${LOGSTASH_PORT:5044}
