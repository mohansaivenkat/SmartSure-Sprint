# ==============================================================
# SHARED DOCKER CONFIGURATION (overrides shared config in Docker)
# ==============================================================

# Database — inside Docker network, use container name + INTERNAL port (5432)
spring.datasource.url=jdbc:postgresql://postgres:5432/smart_sure
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD}

# Eureka — use container service name
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true

# Redis — use container service name
spring.data.redis.host=redis
spring.data.redis.port=6379

# RabbitMQ — use container service name
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_DEFAULT_USER:guest}
spring.rabbitmq.password=${RABBITMQ_DEFAULT_PASS:guest}

# Logstash — use container service name
logstash.host=logstash

# Zipkin — disabled for simplicity (no zipkin container)
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans
management.tracing.sampling.probability=0.0
