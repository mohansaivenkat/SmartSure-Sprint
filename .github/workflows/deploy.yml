name: SmartSure CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  sonar-analysis:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [
          'eureka-server', 
          'config-server', 
          'api-gateway', 
          'auth-service', 
          'admin-service', 
          'policy-service', 
          'claims-service', 
          'payment-service', 
          'notification-service'
        ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Analyze with SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -d "./backend/${{ matrix.service }}" ] && [ -f "./backend/${{ matrix.service }}/pom.xml" ]; then
            cd backend/${{ matrix.service }}
            mvn -B clean verify sonar:sonar -Dsonar.token=$SONAR_TOKEN
          else
            echo "Skipping non-Maven service: ${{ matrix.service }}"
          fi

  build-and-push:
    runs-on: ubuntu-latest
    needs: sonar-analysis
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        service: [
          'eureka-server', 
          'config-server', 
          'api-gateway', 
          'auth-service', 
          'admin-service', 
          'policy-service', 
          'claims-service', 
          'payment-service', 
          'notification-service'
        ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/${{ matrix.service }}
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/smartsure-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=inline

  build-and-push-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/smartsure-frontend:latest
          cache-from: type=gha
          cache-to: type=inline

  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-push, build-and-push-frontend]
    steps:
      - name: Deploy to Azure VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # Navigate to project directory (Adjust path as needed)
            cd ~/SmartSure-Insurance-Management-System-V9 || cd ~/SmartSure* || echo "Directory not found"
            
            # Pull latest images
            docker-compose pull
            
            # Restart services with updated images
            docker-compose up -d
            
            # Cleanup old images to save space
            docker image prune -f
