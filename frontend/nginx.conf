server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # React Router: serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the Gateway
    # We use the service name 'api-gateway' as defined in docker-compose.yml
    location /auth-service/ {
        proxy_pass http://api-gateway:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /policy-service/ {
        proxy_pass http://api-gateway:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /claims-service/ {
        proxy_pass http://api-gateway:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /admin-service/ {
        proxy_pass http://api-gateway:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /payment-service/ {
        proxy_pass http://api-gateway:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Gzip for performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
